<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>윤준영의 숫자 야구</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("number-baseball-theme");
          if (stored === "light" || stored === "dark") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <main class="app-shell">
      <section class="game-board" aria-label="윤준영의 숫자 야구 게임">
        <div class="topbar">
          <div>
            <p class="eyebrow">Number Baseball</p>
            <h1>윤준영의 숫자 야구</h1>
          </div>
          <div class="topbar-actions">
            <nav class="app-links" aria-label="다른 앱으로 이동">
              <a
                class="link-button"
                href="https://ysoftman.github.io/worldcup-match/"
                aria-label="월드컵 매치로 이동"
                title="월드컵 매치"
              >
                <span aria-hidden="true">⚽</span>
                <span>월드컵</span>
              </a>
              <a
                class="link-button"
                href="https://ysoftman.github.io/dadjoke/"
                aria-label="아재개그로 이동"
                title="아재개그"
              >
                <span aria-hidden="true">😄</span>
                <span>아재개그</span>
              </a>
            </nav>
            <button
              class="icon-button"
              id="themeToggle"
              type="button"
              aria-label="테마 전환"
              title="테마 전환"
              aria-pressed="false"
            >
              <span class="theme-icon" aria-hidden="true">☾</span>
            </button>
            <button
              class="icon-button"
              id="newGameButton"
              type="button"
              aria-label="새 게임"
              title="새 게임"
            >
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </div>

        <section class="settings-panel">
          <div class="panel-heading">
            <h2>설정</h2>
            <span id="answerLengthLabel">3자리</span>
          </div>

          <div class="segmented-control" role="group" aria-label="정답 자리수">
            <button class="segment is-active" type="button" data-length="3">
              3자리
            </button>
            <button class="segment" type="button" data-length="4">4자리</button>
          </div>

          <label class="toggle-line">
            <input id="allowZeroToggle" type="checkbox" checked />
            <span>0 포함</span>
          </label>
        </section>

        <div class="field-panel">
          <svg
            class="field-art"
            viewBox="0 17 320 220"
            focusable="false"
            aria-hidden="true"
          >
            <path d="M160 52 L248 132 L160 202 L72 132 Z" fill="#d6a75f" />
            <path d="M160 74 L222 132 L160 181 L98 132 Z" fill="#237d4e" />
            <g fill="#f9f4e7" stroke="#8e5c28" stroke-width="3">
              <rect
                x="151"
                y="44"
                width="18"
                height="18"
                transform="rotate(45 160 53)"
              />
              <rect
                x="240"
                y="124"
                width="18"
                height="18"
                transform="rotate(45 249 133)"
              />
              <rect
                x="151"
                y="193"
                width="18"
                height="18"
                transform="rotate(45 160 202)"
              />
              <rect
                x="62"
                y="124"
                width="18"
                height="18"
                transform="rotate(45 71 133)"
              />
            </g>
            <circle
              cx="160"
              cy="132"
              r="16"
              fill="#f9f4e7"
              stroke="#b63b35"
              stroke-width="3"
            />
            <path
              d="M150 122 C156 128 156 136 150 142"
              fill="none"
              stroke="#b63b35"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M170 122 C164 128 164 136 170 142"
              fill="none"
              stroke="#b63b35"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <svg
            class="field-slots"
            id="fieldSlots"
            viewBox="0 17 320 220"
            focusable="false"
            aria-hidden="true"
          >
            <g class="digit-slot" data-base="home">
              <circle cx="160" cy="202" r="18" />
              <text
                x="160"
                y="202"
                text-anchor="middle"
                dominant-baseline="central"
              ></text>
            </g>
            <g class="digit-slot" data-base="first">
              <circle cx="249" cy="133" r="18" />
              <text
                x="249"
                y="133"
                text-anchor="middle"
                dominant-baseline="central"
              ></text>
            </g>
            <g class="digit-slot" data-base="second">
              <circle cx="160" cy="53" r="18" />
              <text
                x="160"
                y="53"
                text-anchor="middle"
                dominant-baseline="central"
              ></text>
            </g>
            <g class="digit-slot" data-base="third">
              <circle cx="71" cy="133" r="18" />
              <text
                x="71"
                y="133"
                text-anchor="middle"
                dominant-baseline="central"
              ></text>
            </g>
          </svg>
          <div class="score-strip" aria-label="현재 게임 상태">
            <div>
              <span>시도</span>
              <strong id="attemptCount">0</strong>
            </div>
            <div>
              <span>남은 기회</span>
              <strong id="remainingCount">-</strong>
            </div>
            <div>
              <span>최고 기록</span>
              <strong id="bestScore">-</strong>
            </div>
          </div>
          <div class="result-callout" id="resultCallout">
            <span>플레이 볼</span>
            <strong>정답을 맞혀보세요</strong>
          </div>
        </div>

        <p class="status-text" id="statusText" role="status" aria-live="polite">
          서로 다른 숫자를 입력하세요.
        </p>

        <div class="keypad" id="keypad" aria-label="숫자 키패드"></div>

        <div class="action-row">
          <button class="secondary-button" id="deleteButton" type="button">
            지우기
          </button>
          <button class="primary-button" id="submitButton" type="button">
            제출
          </button>
        </div>
      </section>

      <aside class="side-panel" aria-label="게임 기록과 판정">
        <section class="rules-panel">
          <h2>판정</h2>
          <dl>
            <div>
              <dt class="rule-strike">Strike</dt>
              <dd>숫자와 위치가 모두 맞음</dd>
            </div>
            <div>
              <dt class="rule-ball">Ball</dt>
              <dd>숫자는 맞고 위치가 다름</dd>
            </div>
            <div>
              <dt class="rule-out">Out</dt>
              <dd>맞는 숫자가 없음</dd>
            </div>
          </dl>
        </section>

        <section class="history-panel">
          <div class="panel-heading">
            <h2>기록</h2>
            <button class="text-button" id="revealButton" type="button">
              정답 보기
            </button>
          </div>
          <ol class="history-list" id="historyList"></ol>
          <p class="empty-history" id="emptyHistory">
            아직 제출한 숫자가 없습니다.
          </p>
        </section>

        <footer class="build-meta" aria-label="빌드 정보">
          <span>
            버전
            <strong id="buildVersion" data-build-version="__BUILD_VERSION__">
              local
            </strong>
          </span>
          <span>
            빌드
            <time id="buildTime" data-build-time="__BUILD_TIME__">-</time>
          </span>
        </footer>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
